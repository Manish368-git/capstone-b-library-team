name: Python CI

on:
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          cd backend
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start backend server
        run: |
          cd backend
          python run.py &
          sleep 5

      - name: Smoke test /healthz
        run: |
          curl -f http://127.0.0.1:5000/healthz

      - name: Run pytest
        run: |
          cd backend
          PYTHONPATH=. pytest -q
